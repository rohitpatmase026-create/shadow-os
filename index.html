<!DOCTYPE html>

    <title>SHADOW OS</title>

    <link rel="stylesheet" href="style.css" />

  <body>
    <div id="app">
      <!-- TOP BAR -->

      <div class="top-bar">
        <h1>SHADOW OS</h1>

        <p>Cinematic AI Assistant</p>

      <!-- CHAT -->

      <div id="chat-box">

          ⚔ SYSTEM ONLINE

          Welcome back.
          <br />

          SHADOW OS initialized.
        </div>
      </div>

      <!-- INPUT -->

      <div class="input-area">
        <input type="text" id="input" placeholder="Ask anything..." />

        <button id="mic">🎤</button>

        <button id="send">ARISE</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
